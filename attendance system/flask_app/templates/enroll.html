{% extends "base.html" %}
{% block title %}Enroll · Smart Attendance{% endblock %}
{% block content %}
<header class="page-head">
  <div>
    <h1>Enroll student</h1>
    <p class="muted">Add a new student with up to 3 face photos (different angles).</p>
  </div>
</header>
<section class="card form-card">
  <form method="post" enctype="multipart/form-data" class="form">
    <label>
      <span>Full name</span>
      <input name="name" placeholder="e.g. Asha Patel" required />
    </label>
    <label>
      <span>Roll number <em>(optional)</em></span>
      <input name="roll" placeholder="e.g. CS-2204" />
    </label>
    <label>
      <span>Class</span>
      <select name="class_id" required>
        {% for c in classes %}
          <option value="{{ c.id }}" {% if c.id == current_class_id %}selected{% endif %}>{{ c.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="photo-field">
      <span>Photos <em>(select 1-3 photos, different angles for better accuracy)</em></span>
      <input id="enrollPhoto" name="photo" type="file" accept="image/*" multiple required />
      <div class="photo-preview" id="enrollPreview" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;"></div>
    </label>
    <p class="muted" style="font-size:0.85rem;">
      💡 Tip: Select front, left, right angle photos for best recognition accuracy!
    </p>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Enroll student</button>
      <a class="btn btn-ghost" href="{{ url_for('students', class_id=current_class_id) }}">Cancel</a>
    </div>
  </form>
</section>
<script>
  const input = document.getElementById('enrollPhoto');
  const preview = document.getElementById('enrollPreview');
  input.addEventListener('change', () => {
    preview.innerHTML = '';
    Array.from(input.files).forEach((f, i) => {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'text-align:center;';
      const img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      img.style.cssText = 'width:100px; height:100px; object-fit:cover; border-radius:8px; border:2px solid #4CAF50;';
      const label = document.createElement('p');
      label.textContent = i === 0 ? 'Front' : i === 1 ? 'Left' : 'Right';
      label.style.cssText = 'font-size:0.75rem; margin:4px 0 0; color:#4CAF50;';
      wrapper.appendChild(img);
      wrapper.appendChild(label);
      preview.appendChild(wrapper);
    });
  });
</script>
{% endblock %}
